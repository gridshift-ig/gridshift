name: Gridshift auto-post

# Posts ONE car-news card to Instagram every 3 hours, 24/7 (8 posts/day).
# The category rotates performance -> racing -> wagon by UTC hour, so a day
# lands ~3 performance / 3 racing / 2 wagon. Times are UTC.
on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours: 00,03,06,09,12,15,18,21 UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab

# Allow the job to push the generated images + history back to the repo.
permissions:
  contents: write

concurrency:
  group: gridshift-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate one post (category rotates by UTC hour)
        run: python generate.py --count 1 --category auto

      - name: Commit generated images (so Instagram can fetch them)
        run: |
          git config user.name "gridshift-bot"
          git config user.email "bot@users.noreply.github.com"
          git add posts/
          git commit -m "Auto: generated post $(date -u +%FT%TZ)" || echo "nothing to commit"
          git push

      - name: Wait for raw CDN to serve the new images
        run: sleep 45

      - name: Publish to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IMAGE_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/posts
        run: |
          DIR=$(ls -dt posts/*/ | head -1)
          echo "Publishing $DIR"
          python publish.py --dir "$DIR"

      - name: Save updated post history
        run: |
          git add posts/
          git commit -m "Auto: mark posted $(date -u +%FT%TZ)" || echo "nothing to commit"
          git push
