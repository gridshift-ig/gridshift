name: Gridshift auto-post

# Posts car-news cards to Instagram on a schedule.
# Times are UTC. Two batches/day, 3 posts each (one per category: performance,
# racing, wagon) = 6 posts/day, ~2 per category. Adjust cron lines to taste.
on:
  schedule:
    - cron: "0 13 * * *"   # morning batch (~9am ET / 6am PT)
    - cron: "0 22 * * *"   # evening batch (~6pm ET / 3pm PT)
  workflow_dispatch:        # lets you run it manually from the Actions tab

# Allow the job to push the generated images + history back to the repo.
permissions:
  contents: write

concurrency:
  group: gridshift-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate a 3-post batch (one per category, perf backfill)
        run: python generate.py --count 3

      - name: Commit generated images (so Instagram can fetch them)
        run: |
          git config user.name "gridshift-bot"
          git config user.email "bot@users.noreply.github.com"
          git add posts/
          git commit -m "Auto: generated post $(date -u +%FT%TZ)" || echo "nothing to commit"
          git push

      - name: Wait for raw CDN to serve the new images
        run: sleep 45

      - name: Publish to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IMAGE_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/posts
        run: |
          DIR=$(ls -dt posts/*/ | head -1)
          echo "Publishing $DIR"
          python publish.py --dir "$DIR"

      - name: Save updated post history
        run: |
          git add posts/
          git commit -m "Auto: mark posted $(date -u +%FT%TZ)" || echo "nothing to commit"
          git push
