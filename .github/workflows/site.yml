name: Gridshift website

# Rebuilds the public homepage (categorized car-news, links to sources) and
# deploys it to GitHub Pages. Same RSS pipeline as the Instagram poster.
# This page is the Instagram bio link.
on:
  schedule:
    - cron: "30 */3 * * *"   # every 3h, offset 30 min from the IG post job
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - build_site.py
      - carnews/**
      - feeds.json
      - .github/workflows/site.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gridshift-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        run: python build_site.py --per-category 12 --out site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
